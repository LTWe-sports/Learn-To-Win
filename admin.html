<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LTW 管理パネル</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root { --black:#0a0a0a; --white:#fff; --gray-light:#f4f4f4; --gray-mid:#e0e0e0; --gray-dark:#888; --border:#d0d0d0; --red:#cc0000; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--gray-light); color:var(--black); font-family:'Noto Sans JP',sans-serif; min-height:100vh; }

  /* LOGIN */
  #login-screen {
    position:fixed; inset:0; background:var(--white); z-index:9999;
    display:flex; align-items:center; justify-content:center;
  }
  .login-box { width:100%; max-width:400px; padding:48px 40px; border:2px solid var(--black); background:var(--white); }
  .login-title { font-family:'Bebas Neue',sans-serif; font-size:2.5rem; letter-spacing:0.05em; margin-bottom:4px; }
  .login-sub { font-family:'Share Tech Mono',monospace; font-size:0.65rem; letter-spacing:0.2em; color:var(--gray-dark); margin-bottom:32px; text-transform:uppercase; }
  .login-label { font-family:'Share Tech Mono',monospace; font-size:0.6rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--gray-dark); display:block; margin-bottom:6px; }
  .login-input { width:100%; border:1.5px solid var(--black); padding:12px 16px; font-family:'Noto Sans JP',sans-serif; font-size:1rem; outline:none; margin-bottom:12px; }
  .login-input:focus { border-color:#555; }
  .login-error { font-family:'Share Tech Mono',monospace; font-size:0.65rem; color:var(--red); letter-spacing:0.1em; margin-bottom:12px; display:none; }
  .login-btn { width:100%; background:var(--black); color:var(--white); border:none; padding:14px; font-family:'Share Tech Mono',monospace; font-size:0.75rem; letter-spacing:0.2em; text-transform:uppercase; cursor:pointer; transition:opacity 0.2s; }
  .login-btn:hover { opacity:0.75; }

  /* MAIN */
  #main-app { display:none; }
  header {
    background:var(--white); border-bottom:1.5px solid var(--black);
    padding:0 5vw; height:64px; display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:100;
  }
  .header-logo { font-family:'Bebas Neue',sans-serif; font-size:1.5rem; letter-spacing:0.1em; }
  .header-logo span { font-family:'Share Tech Mono',monospace; font-size:0.6rem; letter-spacing:0.2em; color:var(--gray-dark); margin-left:12px; vertical-align:middle; }
  .header-actions { display:flex; gap:10px; }
  .btn { font-family:'Share Tech Mono',monospace; font-size:0.65rem; letter-spacing:0.15em; text-transform:uppercase; padding:10px 20px; border:1.5px solid var(--black); background:transparent; color:var(--black); cursor:pointer; transition:all 0.2s; }
  .btn:hover { background:var(--black); color:var(--white); }
  .btn.primary { background:var(--black); color:var(--white); }
  .btn.primary:hover { opacity:0.75; }
  .btn.danger { border-color:var(--red); color:var(--red); }
  .btn.danger:hover { background:var(--red); color:var(--white); }

  .container { max-width:1200px; margin:0 auto; padding:40px 5vw; }

  /* TABS */
  .tabs { display:flex; gap:0; border-bottom:1.5px solid var(--black); margin-bottom:32px; }
  .tab-btn { font-family:'Share Tech Mono',monospace; font-size:0.7rem; letter-spacing:0.15em; text-transform:uppercase; padding:12px 24px; border:none; background:transparent; color:var(--gray-dark); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1.5px; transition:all 0.2s; }
  .tab-btn.active { color:var(--black); border-bottom-color:var(--black); }

  /* CARDS */
  .card { background:var(--white); border:1px solid var(--border); padding:32px; margin-bottom:24px; }
  .card-title { font-family:'Bebas Neue',sans-serif; font-size:1.6rem; letter-spacing:0.05em; margin-bottom:20px; display:flex; align-items:center; gap:12px; }
  .card-title span { font-family:'Share Tech Mono',monospace; font-size:0.6rem; letter-spacing:0.2em; color:var(--gray-dark); font-weight:normal; }

  /* FORM */
  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .form-group { display:flex; flex-direction:column; gap:6px; }
  .form-group.full { grid-column:1/-1; }
  .form-label { font-family:'Share Tech Mono',monospace; font-size:0.6rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--gray-dark); }
  .form-input, .form-select, .form-textarea {
    border:1.5px solid var(--black); padding:10px 14px;
    font-family:'Noto Sans JP',sans-serif; font-size:0.85rem;
    background:var(--white); outline:none; transition:border-color 0.2s; width:100%;
  }
  .form-input:focus, .form-textarea:focus { border-color:#555; }
  .form-textarea { resize:vertical; min-height:80px; }
  .form-select { cursor:pointer; }

  /* IMAGE UPLOAD */
  .img-upload-area {
    border:2px dashed var(--border); padding:24px; text-align:center;
    cursor:pointer; transition:all 0.2s; position:relative; background:var(--gray-light);
  }
  .img-upload-area:hover { border-color:var(--black); background:var(--white); }
  .img-upload-area input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
  .img-upload-text { font-family:'Share Tech Mono',monospace; font-size:0.7rem; letter-spacing:0.15em; color:var(--gray-dark); text-transform:uppercase; }
  .img-preview { width:100%; max-height:200px; object-fit:cover; display:none; margin-top:12px; border:1px solid var(--border); }

  /* MEMBER LIST */
  .member-list { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; margin-top:24px; }
  .member-item { background:var(--white); border:1px solid var(--border); display:flex; gap:16px; align-items:center; padding:16px; transition:border-color 0.2s; }
  .member-item:hover { border-color:var(--black); }
  .member-thumb { width:60px; height:60px; object-fit:cover; background:var(--gray-mid); flex-shrink:0; font-family:'Bebas Neue',sans-serif; font-size:1.8rem; display:flex; align-items:center; justify-content:center; color:var(--gray-dark); }
  .member-thumb img { width:60px; height:60px; object-fit:cover; }
  .member-info { flex:1; min-width:0; }
  .member-ign { font-family:'Bebas Neue',sans-serif; font-size:1.2rem; letter-spacing:0.05em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .member-role-badge { font-family:'Share Tech Mono',monospace; font-size:0.6rem; letter-spacing:0.15em; color:var(--gray-dark); text-transform:uppercase; }
  .member-actions { display:flex; gap:6px; flex-shrink:0; }
  .icon-btn { width:32px; height:32px; border:1px solid var(--border); background:none; cursor:pointer; font-size:0.8rem; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
  .icon-btn:hover { background:var(--black); color:var(--white); border-color:var(--black); }
  .icon-btn.del:hover { background:var(--red); border-color:var(--red); }

  /* STATS */
  .stats-row { display:flex; gap:16px; margin-bottom:32px; flex-wrap:wrap; }
  .stat-card { background:var(--white); border:1px solid var(--border); padding:20px 28px; flex:1; min-width:120px; }
  .stat-card-num { font-family:'Bebas Neue',sans-serif; font-size:2.5rem; line-height:1; }
  .stat-card-label { font-family:'Share Tech Mono',monospace; font-size:0.6rem; letter-spacing:0.2em; color:var(--gray-dark); text-transform:uppercase; margin-top:4px; }

  /* NOTICE */
  .notice { background:var(--gray-light); border:1px solid var(--border); padding:16px 20px; font-family:'Share Tech Mono',monospace; font-size:0.7rem; letter-spacing:0.1em; color:var(--gray-dark); margin-bottom:24px; line-height:1.8; }
  .notice strong { color:var(--black); }

  /* EMPTY */
  .empty-msg { text-align:center; padding:60px 20px; font-family:'Share Tech Mono',monospace; font-size:0.7rem; color:var(--gray-dark); letter-spacing:0.2em; text-transform:uppercase; }

  /* SEARCH */
  .search-bar { display:flex; gap:12px; margin-bottom:20px; }
  .search-input { flex:1; border:1.5px solid var(--black); padding:10px 16px; font-family:'Noto Sans JP',sans-serif; font-size:0.85rem; outline:none; }

  /* TOAST */
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(100px); background:var(--black); color:var(--white); font-family:'Share Tech Mono',monospace; font-size:0.7rem; letter-spacing:0.15em; padding:12px 28px; z-index:9999; transition:transform 0.3s cubic-bezier(0.4,0,0.2,1); pointer-events:none; white-space:nowrap; }
  .toast.show { transform:translateX(-50%) translateY(0); }

  @media(max-width:600px) { .form-grid{grid-template-columns:1fr} .form-group.full{grid-column:1} .stats-row{gap:8px} }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-title">LTW ADMIN</div>
    <div class="login-sub">Learn To Win — 管理パネル</div>
    <label class="login-label">パスワード</label>
    <input type="password" id="pw-input" class="login-input" placeholder="パスワードを入力..." onkeydown="if(event.key==='Enter')login()">
    <div class="login-error" id="login-error">✕ パスワードが違います</div>
    <button class="login-btn" onclick="login()">ログイン →</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="main-app">
  <header>
    <div class="header-logo">
      LTW ADMIN
      <span>LEARN TO WIN</span>
    </div>
    <div class="header-actions">
      <button class="btn primary" onclick="exportSite()">⬇ index.html を出力</button>
      <button class="btn" onclick="logout()">ログアウト</button>
    </div>
  </header>

  <div class="container">
    <div class="notice">
      <strong>使い方：</strong> メンバーを追加・編集したら「⬇ index.html を出力」ボタンを押してダウンロード → GitHubに上書きアップロードすると公開サイトに反映されます。
    </div>

    <!-- STATS -->
    <div class="stats-row">
      <div class="stat-card"><div class="stat-card-num" id="s-total">0</div><div class="stat-card-label">総メンバー数</div></div>
      <div class="stat-card"><div class="stat-card-num" id="s-owner">0</div><div class="stat-card-label">OWNER</div></div>
      <div class="stat-card"><div class="stat-card-num" id="s-staff">0</div><div class="stat-card-label">STAFF</div></div>
      <div class="stat-card"><div class="stat-card-num" id="s-comp">0</div><div class="stat-card-label">競技</div></div>
    </div>

    <!-- TABS -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('add')">＋ メンバー追加</button>
      <button class="tab-btn" onclick="switchTab('list')">👥 メンバー一覧</button>
      <button class="tab-btn" onclick="switchTab('settings')">⚙ サイト設定</button>
    </div>

    <!-- TAB: ADD -->
    <div id="tab-add">
      <div class="card">
        <div class="card-title">メンバーを追加 <span id="add-or-edit-label">NEW</span></div>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">ゲーム名（IGN）*</label>
            <input type="text" id="f-ign" class="form-input" placeholder="例: ProPlayer123">
          </div>
          <div class="form-group">
            <label class="form-label">本名</label>
            <input type="text" id="f-realname" class="form-input" placeholder="例: 山田 太郎">
          </div>
          <div class="form-group">
            <label class="form-label">ロール</label>
            <select id="f-role" class="form-select">
              <option value="OWNER">OWNER</option>
              <option value="STAFF">STAFF</option>
              <option value="競技">競技</option>
              <option value="育成">育成</option>
              <option value="CS">CS</option>
              <option value="モバイル">モバイル</option>
              <option value="STREAMER">STREAMER</option>
              <option value="女子">女子</option>
              <option value="DESIGNER">DESIGNER</option>
              <option value="EDITOR">EDITOR</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">X（旧Twitter）URL</label>
            <input type="url" id="f-twitter" class="form-input" placeholder="https://x.com/username">
          </div>

          <!-- IMAGE UPLOAD -->
          <div class="form-group full">
            <label class="form-label">メンバー画像（スマホ・PCからアップロード可）</label>
            <div class="img-upload-area" id="upload-area">
              <input type="file" id="f-img-file" accept="image/*" onchange="handleImageUpload(event)">
              <div class="img-upload-text">📷 タップ or クリックして画像を選択<br><span style="font-size:0.55rem;opacity:0.6">JPG / PNG / WEBP 対応</span></div>
              <img id="img-preview" class="img-preview" alt="プレビュー">
            </div>
            <input type="hidden" id="f-img-data">
          </div>

          <div class="form-group full">
            <label class="form-label">プロフィール</label>
            <textarea id="f-bio" class="form-textarea" placeholder="メンバーの紹介文を入力..."></textarea>
          </div>
        </div>
        <div style="display:flex;gap:10px;margin-top:20px;flex-wrap:wrap">
          <button class="btn primary" onclick="saveMember()" id="save-btn">＋ 追加する</button>
          <button class="btn" onclick="clearForm()" id="cancel-edit-btn" style="display:none">キャンセル</button>
        </div>
        <input type="hidden" id="edit-index" value="-1">
      </div>
    </div>

    <!-- TAB: LIST -->
    <div id="tab-list" style="display:none">
      <div class="card">
        <div class="card-title">メンバー一覧 <span id="member-count-label">0 / 50</span></div>
        <div class="search-bar">
          <input type="text" class="search-input" placeholder="名前で検索..." oninput="renderList(this.value)">
        </div>
        <div class="member-list" id="member-list"></div>
      </div>
    </div>

    <!-- TAB: SETTINGS -->
    <div id="tab-settings" style="display:none">
      <div class="card">
        <div class="card-title">サイト設定</div>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">設立年</label>
            <input type="text" id="s-founded" class="form-input" placeholder="例: 2024">
          </div>
          <div class="form-group">
            <label class="form-label">拠点</label>
            <input type="text" id="s-region" class="form-input" placeholder="例: JP">
          </div>
          <div class="form-group full">
            <label class="form-label">タグライン（ヒーロー下のテキスト）</label>
            <input type="text" id="s-tagline" class="form-input" placeholder="例: // 勝利を学べ、勝利を掴め — Fortnite Competitive Team">
          </div>
        </div>
        <button class="btn primary" onclick="saveSettings()" style="margin-top:20px">✓ 設定を保存</button>
      </div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const PASSWORD = 'LTWshion1007';

// ===== AUTH =====
function login() {
  const val = document.getElementById('pw-input').value;
  if (val === PASSWORD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'block';
    loadSettings();
    renderStats();
    renderList();
  } else {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}
function logout() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('main-app').style.display = 'none';
  document.getElementById('pw-input').value = '';
}
document.getElementById('pw-input').addEventListener('keydown', e => { if(e.key==='Enter') login(); });

// ===== DATA =====
let members = JSON.parse(localStorage.getItem('ltw_members') || '[]');
let siteSettings = JSON.parse(localStorage.getItem('ltw_settings') || '{"founded":"2024","region":"JP","tagline":"// 勝利を学べ、勝利を掴め — Fortnite Competitive Team"}');

function saveMembers() { localStorage.setItem('ltw_members', JSON.stringify(members)); }
function saveSettingsData() { localStorage.setItem('ltw_settings', JSON.stringify(siteSettings)); }

// ===== TABS =====
function switchTab(name) {
  ['add','list','settings'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t===name ? 'block' : 'none';
    document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', ['add','list','settings'][i]===name));
  });
  if(name==='list') renderList();
}

// ===== IMAGE UPLOAD =====
function handleImageUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const data = ev.target.result;
    document.getElementById('f-img-data').value = data;
    const preview = document.getElementById('img-preview');
    preview.src = data;
    preview.style.display = 'block';
    document.querySelector('#upload-area .img-upload-text').textContent = '✓ 画像が選択されました';
  };
  reader.readAsDataURL(file);
}

// ===== FORM =====
function saveMember() {
  const ign = document.getElementById('f-ign').value.trim();
  if (!ign) { showToast('ゲーム名は必須です'); return; }
  if (members.length >= 50 && document.getElementById('edit-index').value === '-1') {
    showToast('メンバー上限（50人）です'); return;
  }

  const member = {
    ign,
    realname: document.getElementById('f-realname').value.trim(),
    role:     document.getElementById('f-role').value,
    twitter:  document.getElementById('f-twitter').value.trim(),
    img:      document.getElementById('f-img-data').value,
    bio:      document.getElementById('f-bio').value.trim(),
  };

  const idx = parseInt(document.getElementById('edit-index').value);
  if (idx >= 0) {
    members[idx] = member;
    showToast('✓ メンバーを更新しました');
  } else {
    members.push(member);
    showToast('✓ メンバーを追加しました');
  }

  saveMembers();
  clearForm();
  renderStats();
  renderList();
}

function clearForm() {
  document.getElementById('f-ign').value = '';
  document.getElementById('f-realname').value = '';
  document.getElementById('f-role').value = 'OWNER';
  document.getElementById('f-twitter').value = '';
  document.getElementById('f-bio').value = '';
  document.getElementById('f-img-data').value = '';
  document.getElementById('f-img-file').value = '';
  document.getElementById('img-preview').style.display = 'none';
  document.querySelector('#upload-area .img-upload-text').innerHTML = '📷 タップ or クリックして画像を選択<br><span style="font-size:0.55rem;opacity:0.6">JPG / PNG / WEBP 対応</span>';
  document.getElementById('edit-index').value = '-1';
  document.getElementById('save-btn').textContent = '＋ 追加する';
  document.getElementById('cancel-edit-btn').style.display = 'none';
  document.getElementById('add-or-edit-label').textContent = 'NEW';
}

function editMember(i) {
  const m = members[i];
  document.getElementById('f-ign').value      = m.ign || '';
  document.getElementById('f-realname').value = m.realname || '';
  document.getElementById('f-role').value     = m.role || 'OWNER';
  document.getElementById('f-twitter').value  = m.twitter || '';
  document.getElementById('f-bio').value      = m.bio || '';
  document.getElementById('f-img-data').value = m.img || '';
  if (m.img) {
    const preview = document.getElementById('img-preview');
    preview.src = m.img; preview.style.display = 'block';
    document.querySelector('#upload-area .img-upload-text').textContent = '✓ 画像が設定済みです';
  }
  document.getElementById('edit-index').value = i;
  document.getElementById('save-btn').textContent = '✓ 更新する';
  document.getElementById('cancel-edit-btn').style.display = 'inline-block';
  document.getElementById('add-or-edit-label').textContent = 'EDIT';
  switchTab('add');
  window.scrollTo({top:0,behavior:'smooth'});
}

function deleteMember(i) {
  if (!confirm(`「${members[i].ign}」を削除しますか？`)) return;
  members.splice(i, 1);
  saveMembers();
  renderStats();
  renderList();
  showToast('✓ 削除しました');
}

// ===== RENDER LIST =====
function renderList(query = '') {
  const list = document.getElementById('member-list');
  document.getElementById('member-count-label').textContent = `${members.length} / 50`;
  const filtered = query ? members.filter(m => m.ign.toLowerCase().includes(query.toLowerCase()) || (m.realname||'').toLowerCase().includes(query.toLowerCase())) : members;

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-msg">メンバーがいません</div>'; return;
  }

  list.innerHTML = filtered.map((m) => {
    const i = members.indexOf(m);
    return `
    <div class="member-item">
      <div class="member-thumb">
        ${m.img ? `<img src="${m.img}" alt="" onerror="this.parentElement.textContent='${m.ign.charAt(0).toUpperCase()}'">` : m.ign.charAt(0).toUpperCase()}
      </div>
      <div class="member-info">
        <div class="member-ign">${escHtml(m.ign)}</div>
        <div class="member-role-badge">${escHtml(m.role)}${m.realname ? ' · '+escHtml(m.realname) : ''}</div>
      </div>
      <div class="member-actions">
        <button class="icon-btn" onclick="editMember(${i})" title="編集">✏</button>
        <button class="icon-btn del" onclick="deleteMember(${i})" title="削除">✕</button>
      </div>
    </div>`;
  }).join('');
}

// ===== STATS =====
function renderStats() {
  document.getElementById('s-total').textContent = members.length;
  document.getElementById('s-owner').textContent = members.filter(m=>m.role==='OWNER').length;
  document.getElementById('s-staff').textContent = members.filter(m=>m.role==='STAFF').length;
  document.getElementById('s-comp').textContent  = members.filter(m=>m.role==='競技').length;
}

// ===== SETTINGS =====
function loadSettings() {
  document.getElementById('s-founded').value = siteSettings.founded || '2024';
  document.getElementById('s-region').value  = siteSettings.region  || 'JP';
  document.getElementById('s-tagline').value = siteSettings.tagline || '';
}
function saveSettings() {
  siteSettings.founded = document.getElementById('s-founded').value.trim() || siteSettings.founded;
  siteSettings.region  = document.getElementById('s-region').value.trim()  || siteSettings.region;
  siteSettings.tagline = document.getElementById('s-tagline').value.trim() || siteSettings.tagline;
  saveSettingsData();
  showToast('✓ 設定を保存しました');
}

// ===== EXPORT =====
function exportSite() {
  // index.htmlのテンプレートを生成
  const membersJson = JSON.stringify(members);
  const settingsJson = JSON.stringify(siteSettings);

  fetch('index.html')
    .then(r => r.text())
    .then(html => {
      html = html.replace('/*MEMBERS_DATA*/[]', '/*MEMBERS_DATA*/' + membersJson);
      html = html.replace(/\/\*SETTINGS_DATA\*\/\{.*?\}/, '/*SETTINGS_DATA*/' + settingsJson);
      download(html, 'index.html');
      showToast('✓ index.html をダウンロードしました');
    })
    .catch(() => {
      // index.htmlが同じフォルダにない場合のフォールバック
      showToast('⚠ index.html が見つかりません。同じフォルダに置いてください');
    });
}

function download(content, filename) {
  const blob = new Blob([content], {type:'text/html;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

// ===== UTILS =====
function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
